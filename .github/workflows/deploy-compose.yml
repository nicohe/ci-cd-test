name: Deploy con Docker Compose

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Parar servicios anteriores
      run: docker compose down -v || true

    - name: Construir servicios
      run: docker compose -f docker-compose.yml build

    - name: Levantar servicios
      run: docker compose -f docker-compose.yml up -d

    - name: Esperar servicios
      run: sleep 10

    - name: Verificar ping
      run: curl -f http://localhost:80/ping

    - name: Verificar health
      run: |
        curl -f http://localhost:80/health
        echo "Health check details:"
        curl -s http://localhost:80/health | python3 -m json.tool

    - name: Mostrar estado de contenedores
      run: docker compose ps

    - name: Verificar logs de app
      run: docker compose logs app --tail=30

    - name: Mostrar logs completos si falla
      if: failure()
      run: |
        echo "=== APP LOGS ==="
        docker compose logs app
        echo "=== NGINX LOGS ==="
        docker compose logs nginx
